<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="100%" height="100%">
  <!-- Definitions for glowing filters and gradients -->
  <defs>
    <!-- Glow Filters -->
    <filter id="glow-life" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-heart" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-head" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-fate" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Background Gradient -->
    <radialGradient id="hand-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1c123c" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0c0721" stop-opacity="0.9"/>
    </radialGradient>
  </defs>

  <style>
    .hand-outline {
      fill: url(#hand-grad);
      stroke: #d4af37;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0px 0px 10px rgba(212, 175, 55, 0.2));
    }
    .palm-details {
      fill: none;
      stroke: #3d2a7a;
      stroke-width: 1.5;
      stroke-dasharray: 4 2;
      opacity: 0.6;
    }
    .palm-line-interactive {
      fill: none;
      stroke-width: 6;
      stroke-linecap: round;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .palm-line-interactive:hover {
      stroke-width: 9;
      filter: url(#glow-life);
      opacity: 1;
    }
    .line-label {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      fill: #e2e8f0;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }
    .palm-line-interactive:hover + .line-label {
      opacity: 1;
    }
  </style>

  <!-- Hand Outline Path (Stunning and realistic proportions) -->
  <path class="hand-outline" d="
    M 130 460 
    C 115 440, 95 380, 95 330 
    C 95 315, 80 300, 70 290
    C 55 275, 30 260, 45 235
    C 55 220, 85 245, 105 270
    C 105 230, 110 160, 115 110
    C 118 90, 142 90, 142 110
    C 142 150, 145 200, 148 220
    C 148 180, 158 100, 165 60
    C 168 40, 192 40, 192 60
    C 192 120, 195 200, 198 220
    C 198 180, 215 100, 222 75
    C 225 55, 248 55, 248 75
    C 248 140, 248 200, 248 230
    C 248 190, 268 120, 275 110
    C 278 95, 300 100, 298 120
    C 292 180, 282 250, 285 300
    C 288 340, 310 380, 310 405
    C 310 440, 290 460, 270 460
    Z" />

  <!-- Minor Palm Creases & Details (Mystical decor) -->
  <path class="palm-details" d="M 120 330 Q 150 360, 190 350" />
  <path class="palm-details" d="M 230 310 Q 255 330, 280 300" />
  <path class="palm-details" d="M 160 270 Q 180 290, 210 270" />
  <path class="palm-details" d="M 250 250 C 265 240, 270 210, 275 190" />
  <path class="palm-details" d="M 130 220 C 120 200, 115 170, 120 150" />

  <!-- Interactive Major Lines -->
  
  <!-- Life Line: Curves around the thumb mount (Venus) -->
  <!-- Color: #FF6B6B -->
  <g>
    <path id="lifeLine" class="palm-line-interactive" d="M 125 240 C 135 290, 120 380, 200 440" stroke="#FF6B6B" opacity="0.8" />
    <text x="145" y="340" class="line-label">✦ Life Line</text>
  </g>

  <!-- Head Line: Traverses the middle of the palm horizontally/slanted -->
  <!-- Color: #4ECDC4 -->
  <g>
    <path id="headLine" class="palm-line-interactive" d="M 125 242 C 160 245, 230 260, 275 305" stroke="#4ECDC4" opacity="0.8" />
    <text x="190" y="240" class="line-label">✦ Head Line</text>
  </g>

  <!-- Heart Line: Curves across the top of the palm below the fingers -->
  <!-- Color: #FF1493 -->
  <g>
    <path id="heartLine" class="palm-line-interactive" d="M 285 210 C 230 180, 160 205, 145 240" stroke="#FF1493" opacity="0.8" />
    <text x="210" y="170" class="line-label">✦ Heart Line</text>
  </g>

  <!-- Fate Line: Rises vertically from base towards middle finger -->
  <!-- Color: #9B59B6 -->
  <g>
    <path id="fateLine" class="palm-line-interactive" d="M 200 450 C 200 370, 202 290, 192 195" stroke="#9B59B6" opacity="0.8" />
    <text x="215" y="300" class="line-label">✦ Fate Line</text>
  </g>
</svg>
