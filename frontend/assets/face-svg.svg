<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="100%" height="100%">
  <!-- Definitions for glowing filters and gradients -->
  <defs>
    <!-- Glow Filters -->
    <filter id="glow-forehead" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-eyes" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-nose" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-lips" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-chin" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Background Gradient -->
    <radialGradient id="face-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#12183c" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#070921" stop-opacity="0.9"/>
    </radialGradient>
  </defs>

  <style>
    .face-outline {
      fill: url(#face-grad);
      stroke: #d4af37;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0px 0px 10px rgba(212, 175, 55, 0.2));
    }
    .facial-feature-bg {
      fill: none;
      stroke: #3d2a7a;
      stroke-width: 1.5;
      opacity: 0.4;
      pointer-events: none;
    }
    .face-zone-interactive {
      fill: rgba(255, 255, 255, 0.02);
      stroke-width: 2.5;
      stroke-linecap: round;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .face-zone-interactive:hover {
      fill: rgba(255, 255, 255, 0.08);
      stroke-width: 4;
      opacity: 1;
    }
    #forehead:hover { filter: url(#glow-forehead); }
    #eyes:hover { filter: url(#glow-eyes); }
    #nose:hover { filter: url(#glow-nose); }
    #lips:hover { filter: url(#glow-lips); }
    #chin:hover { filter: url(#glow-chin); }

    .zone-label {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      fill: #e2e8f0;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      text-anchor: middle;
    }
    .face-zone-interactive:hover + .zone-label {
      opacity: 1;
    }
  </style>

  <!-- Face Outline Path -->
  <path class="face-outline" d="
    M 200 60
    C 280 60, 320 100, 320 200
    C 320 300, 280 400, 200 440
    C 120 400, 80 300, 80 200
    C 80 100, 120 60, 200 60
    Z" />

  <!-- Ear details -->
  <path class="facial-feature-bg" d="M 80 180 C 65 180, 65 240, 80 250" />
  <path class="facial-feature-bg" d="M 320 180 C 335 180, 335 240, 320 250" />

  <!-- Hairline guideline -->
  <path class="facial-feature-bg" d="M 120 110 Q 200 120, 280 110" />

  <!-- Interactive Zones -->

  <!-- Forehead Zone: Intelligence -->
  <g>
    <path id="forehead" class="face-zone-interactive" d="
      M 130 115
      C 170 100, 230 100, 270 115
      C 285 140, 280 160, 270 165
      Q 200 175, 130 165
      C 120 160, 115 140, 130 115
      Z" stroke="#4ECDC4" />
    <text x="200" y="140" class="zone-label">✦ Forehead (Intelligence)</text>
  </g>

  <!-- Eyes Zone: Emotions -->
  <g>
    <path id="eyes" class="face-zone-interactive" d="
      M 110 185
      Q 200 195, 290 185
      C 305 210, 305 235, 290 240
      Q 200 245, 110 240
      C 95 235, 95 210, 110 185
      Z" stroke="#FF1493" />
    <!-- Eye shapes drawn as static background inside the zone -->
    <path class="facial-feature-bg" d="M 130 210 Q 155 195, 180 210 Q 155 220, 130 210 Z" />
    <path class="facial-feature-bg" d="M 220 210 Q 245 195, 270 210 Q 245 220, 220 210 Z" />
    <text x="200" y="215" class="zone-label">✦ Eyes (Emotions &amp; Soul)</text>
  </g>

  <!-- Nose Zone: Wealth -->
  <g>
    <path id="nose" class="face-zone-interactive" d="
      M 175 220
      L 225 220
      L 230 330
      C 230 345, 170 345, 170 330
      Z" stroke="#FFD700" />
    <path class="facial-feature-bg" d="M 185 240 L 185 310 Q 200 320, 215 310 L 215 240" />
    <path class="facial-feature-bg" d="M 175 320 C 185 300, 215 300, 225 320" />
    <text x="200" y="280" class="zone-label">✦ Nose (Wealth &amp; Career)</text>
  </g>

  <!-- Lips Zone: Communication -->
  <g>
    <path id="lips" class="face-zone-interactive" d="
      M 140 345
      Q 200 335, 260 345
      C 275 370, 265 395, 250 400
      Q 200 405, 150 400
      C 135 395, 125 370, 140 345
      Z" stroke="#9B59B6" />
    <path class="facial-feature-bg" d="M 160 365 Q 200 350, 240 365 Q 200 380, 160 365" />
    <path class="facial-feature-bg" d="M 160 365 Q 200 368, 240 365" />
    <text x="200" y="375" class="zone-label">✦ Lips (Communication &amp; Love)</text>
  </g>

  <!-- Chin Zone: Willpower -->
  <g>
    <path id="chin" class="face-zone-interactive" d="
      M 120 405
      Q 200 408, 280 405
      C 270 425, 240 442, 200 442
      C 160 442, 130 425, 120 405
      Z" stroke="#FF6B6B" />
    <text x="200" y="425" class="zone-label">✦ Chin (Willpower &amp; Longevity)</text>
  </g>
</svg>
